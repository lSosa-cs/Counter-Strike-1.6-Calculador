<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Source Engine Rate Calculator</title>
    <style>
        :root {
            --bg-color: #242923;
            --container-bg: rgba(36, 44, 34, 0.85);
            --accent-color: #cccccc;
            --text-color: #e2e5e1;
            --text-muted: #84907f;
            --border-color: #384334;
            --valve-orange: #e5a93c;
            --input-bg: #181c17;
        }

        body {
            font-family: "Lucida Console", Monaco, monospace, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--container-bg);
            border: 2px solid var(--border-color);
            padding: 25px;
            border-radius: 4px;
            width: 100%;
            max-width: 450px;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5), 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        h2 {
            color: var(--valve-orange);
            font-size: 18px;
            margin-top: 0;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: var(--text-color);
        }

        input[type="number"] {
            width: 100%;
            padding: 10px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--valve-orange);
            font-family: inherit;
            font-size: 14px;
            box-sizing: border-box;
            border-radius: 2px;
        }

        input[type="number"]:focus {
            outline: 1px solid var(--valve-orange);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #3d4939;
            border: 1px solid #55664f;
            color: var(--text-color);
            font-family: inherit;
            font-size: 13px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            border-radius: 2px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
        }

        button:active {
            background-color: #2d362a;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
        }

        .results {
            margin-top: 25px;
            background-color: rgba(20, 24, 19, 0.9);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 2px;
        }

        .results h3 {
            margin-top: 0;
            font-size: 14px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .console-line {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 8px;
            padding: 4px 6px;
            border-bottom: 1px dashed rgba(56, 67, 52, 0.4);
        }

        .console-line:last-child {
            border-bottom: none;
        }

        .cmd {
            color: var(--text-color);
        }

        .val {
            color: var(--valve-orange);
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Source Engine Rate Setup</h2>
    
    <div class="form-group">
        <label for="speed">Velocidad de Internet (Mbps de Bajada):</label>
        <input type="number" id="speed" placeholder="Ej. 100" min="1">
    </div>
    
    <button onclick="calcularRates()">Aplicar Configuración</button>
    
    <div class="results">
        <h3>Comandos de Consola sugeridos:</h3>
        <div id="output">
            <div class="console-line"><span class="cmd">// Modifica los Mbps arriba para calcular</span></div>
        </div>
    </div>
</div>

<script>
function calcularRates() {
    const speedInput = document.getElementById('speed').value;
    const output = document.getElementById('output');
    
    if (!speedInput || speedInput <= 0) {
        output.innerHTML = '<div class="console-line" style="color:#ff6b6b;">Por favor ingresa una velocidad válida.</div>';
        return;
    }

    const megas = parseFloat(speedInput);
    let rate = 25000;
    let updaterate = 102;
    let cmdrate = 102;
    let ex_interp = "0";

    // Ajustes dinámicos basados en la estabilidad de la conexión
    if (megas >= 100) {
        rate = 100000;
        updaterate = 102;
        cmdrate = 102;
        ex_interp = "0"; // Conexión excelente, el juego auto-calcula ~0.0098
    } else if (megas >= 20) {
        rate = 75000;
        updaterate = 102;
        cmdrate = 102;
        ex_interp = "0"; // Fibra estándar, auto-calcula ~0.0098 estable
    } else if (megas >= 5) {
        rate = 50000;
        updaterate = 60;
        cmdrate = 60;
        ex_interp = "0.03"; // Conexión media, colchón seguro para evitar lag visual
    } else {
        rate = 25000;
        updaterate = 30;
        cmdrate = 30;
        ex_interp = "0.05"; // Conexión lenta o inestable
    }

    output.innerHTML = `
        <div class="console-line"><span class="cmd">rate</span> <span class="val">"${rate}"</span></div>
        <div class="console-line"><span class="cmd">cl_updaterate</span> <span class="val">"${updaterate}"</span></div>
        <div class="console-line"><span class="cmd">cl_cmdrate</span> <span class="val">"${cmdrate}"</span></div>
        <div class="console-line"><span class="cmd">ex_interp</span> <span class="val">"${ex_interp}"</span></div>
        <div class="console-line"><span class="cmd">cl_cmdbackup</span> <span class="val">"2"</span></div>
    `;
}
</script>

</body>
</html>
